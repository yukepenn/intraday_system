# Dataset spec for IBKR QQQ 1-minute bars.
# This is config truth. Runtime resolves paths against repo root.
# Raw parquet is local-only (gitignored). QQQ is expected in canonical raw layout when present;
# legacy layout remains supported for inspection and transition. SPY may remain legacy and is
# outside the current QQQ normalization path.

dataset_id: ibkr_qqq_1m
asset: equity
symbol: QQQ
timeframe: 1m

raw_root: data/raw/ibkr
canonical_raw_layout: "data/raw/ibkr/asset=equity/symbol=QQQ/timeframe=1m/year=YYYY/month=MM/bars.parquet"

curated_root: data/curated/bars_1m_rth
rth_only_default: true
timezone: America/New_York

raw_timestamp:
  # Local QQQ IBKR exports include ``ts_utc`` (UTC tz-aware) and ``ts_ny`` (America/New_York tz-aware).
  column: ts_ny
  timezone_if_naive: America/New_York
  # Audit: treat ``ts_ny`` as **bar START** in US/Eastern for RTH minute indexing.
  semantics: bar_start
  curated_semantics: bar_start

ohlcv:
  open: open
  high: high
  low: low
  close: close
  volume: volume

# Source metadata
source: ibkr
bar_size: "1 min"
what_to_show: TRADES
