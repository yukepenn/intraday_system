strategy: cci_extreme_snapback
base_config: configs/strategies/base/cci_extreme_snapback.yaml
description: Controlled small CCI snapback grid (Phase 14 smoke skeleton).

fixed:
  signal.side: long_only
  risk.target_mode: fixed_r
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.max_hold_minutes: 60

grid:
  risk.stop_mode: [signal_low, rolling_low_20, atr_buffer]
  risk.target_r: [1.0, 1.15]
  signal.oversold_threshold: [-110.0, -90.0]
  signal.cross_threshold: [-85.0, -75.0]
