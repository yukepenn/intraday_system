strategy: orb_retest_continuation
base_config: configs/strategies/base/orb_retest_continuation.yaml
description: Controlled small ORB retest grid (Phase 14 smoke skeleton).

fixed:
  signal.side: long_only
  signal.orb_open_minutes: 15
  risk.target_mode: fixed_r
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.max_hold_minutes: 60

grid:
  risk.stop_mode: [orb_low, orb_mid, signal_low]
  risk.target_r: [1.0, 1.25]
  signal.retest_tolerance_atr: [0.2, 0.3]
  signal.require_close_above_vwap: [false, true]
