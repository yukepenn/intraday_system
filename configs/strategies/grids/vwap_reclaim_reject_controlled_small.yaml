strategy: vwap_reclaim_reject
base_config: configs/strategies/base/vwap_reclaim_reject.yaml
description: Controlled small VWAP reclaim grid (Phase 14 smoke skeleton).

fixed:
  signal.side: long_only
  risk.target_mode: fixed_r
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.max_hold_minutes: 60

grid:
  risk.stop_mode: [signal_low, vwap_atr_buffer, atr_buffer]
  risk.target_r: [1.0, 1.2]
  signal.require_vwap_touch: [false, true]
  signal.close_position_min: [0.45, 0.55]
