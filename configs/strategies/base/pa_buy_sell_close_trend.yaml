strategy: pa_buy_sell_close_trend
family: pa
version: strategy_v1
required_feature_set: pa_core_v1
signal_contract_version: signal_v1

features:
  feature_config: configs/features/pa_core_v1.yaml

signal:
  side: long_only
  entry_start_minute: 60
  entry_end_minute: 300

  body_pct_min: 0.52
  close_position_min: 0.60

  trend_slope_min: 0.0
  close_vs_mean_min: 0.0

  require_vwap_side: false

  score_mode: simple_pa_v1

risk:
  stop_mode: signal_low
  target_mode: fixed_r
  target_r: 1.2
  atr_buffer_mult: 0.35
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  eod_exit_minute: 389
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  max_hold_minutes: 50
