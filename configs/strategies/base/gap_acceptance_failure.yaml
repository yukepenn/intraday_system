strategy: gap_acceptance_failure
family: gap
version: strategy_v1
required_feature_set: gap_level_core_v1
signal_contract_version: signal_v1

features:
  feature_config: configs/features/gap_level_core_v1.yaml

signal:
  # Phase19 immediate fix: canonical configs use side_mode (side is legacy).
  side_mode: long_only
  entry_start_minute: 5
  entry_end_minute: 120
  min_gap_pct: 0.005
  reclaim_mode: prior_close
  require_close_above_vwap: false
  min_vwap_slope: 0.0

risk:
  stop_mode: signal_low
  target_mode: fixed_r
  target_r: 1.2
  atr_buffer_mult: 0.35
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  eod_exit_minute: 389
  max_hold_minutes: 60
