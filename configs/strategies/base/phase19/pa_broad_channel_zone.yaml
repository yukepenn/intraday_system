strategy: pa_broad_channel_zone
family: pa
version: strategy_v1
required_feature_set: pa_brooks_core_v1
signal_contract_version: signal_v1

features:
  feature_config: configs/features/pa_brooks_core_v1.yaml

signal:
  side_mode: long_only
  entry_start_minute: 20
  entry_end_minute: 300
  broad_score_min: 0.4
  pullback_max_depth_atr: 1.5
  require_second_entry: false
  require_reversal_bar: true
  block_trading_range_score_max: 0.85

risk:
  stop_mode: signal_extreme
  target_mode: fixed_r
  target_r: 1.2
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  eod_exit_minute: 389
  max_hold_minutes: 40
