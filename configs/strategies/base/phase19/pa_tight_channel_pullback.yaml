strategy: pa_tight_channel_pullback
family: pa
version: strategy_v1
required_feature_set: pa_brooks_core_v1
signal_contract_version: signal_v1

features:
  feature_config: configs/features/pa_brooks_core_v1.yaml

signal:
  side_mode: long_only
  entry_start_minute: 20
  entry_end_minute: 300
  tight_score_min: 0.65
  pullback_max_depth_atr: 0.8
  require_micro_channel: false
  require_always_in_with_side: false
  late_trend_score_max: 0.95

risk:
  stop_mode: signal_extreme
  target_mode: fixed_r
  target_r: 1.2
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  eod_exit_minute: 389
  max_hold_minutes: 40
