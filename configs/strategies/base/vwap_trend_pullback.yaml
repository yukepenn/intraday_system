strategy: vwap_trend_pullback
family: vwap
version: strategy_v1
required_feature_set: vwap_level_core_v1
signal_contract_version: signal_v1

features:
  feature_config: configs/features/vwap_level_core_v1.yaml

signal:
  side: long_only
  entry_start_minute: 30
  entry_end_minute: 330
  min_vwap_slope: 0.0
  max_pullback_atr: 0.35
  close_position_min: 0.55

risk:
  stop_mode: vwap_atr_buffer
  target_mode: fixed_r
  target_r: 1.2
  atr_buffer_mult: 0.35
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  eod_exit_minute: 389
  max_hold_minutes: 60
