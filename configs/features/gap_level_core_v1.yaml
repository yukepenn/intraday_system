feature_set_id: gap_level_core_v1
version: feature_set_v1
description: Gap and prior-session level market facts (Phase 13).

engine:
  mode: reference
  session_reset: true
  dtype: float64

features:
  levels:
    enabled: true
    outputs:
      - prior_session_open
      - prior_session_high
      - prior_session_low
      - prior_session_close
      - open_gap_pct
      - dist_to_prior_high_pct
      - dist_to_prior_low_pct
      - dist_to_prior_close_pct

  vwap:
    enabled: true
    price: hlc3
    outputs:
      - vwap
      - vwap_slope_5
      - vwap_side

  volatility:
    enabled: true
    atr_like_windows: [20]
    range_windows: [20]
    outputs:
      - atr_like
      - range_mean

  price_action:
    enabled: true
    rolling_windows: [20]
    outputs:
      - rolling_low
      - rolling_high
      - close_position_in_range
