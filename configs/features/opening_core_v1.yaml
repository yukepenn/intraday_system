feature_set_id: opening_core_v1
version: feature_set_v1
description: ORB-family opening session market facts (Phase 13).

engine:
  mode: reference
  session_reset: true
  dtype: float64

features:
  vwap:
    enabled: true
    price: hlc3
    outputs:
      - vwap
      - vwap_slope_5
      - vwap_side
      - vwap_dist
      - vwap_dist_pct

  orb:
    enabled: true
    open_minutes: [15]
    outputs:
      - orb_high
      - orb_low
      - orb_mid
      - orb_range
      - orb_width_pct

  volatility:
    enabled: true
    atr_like_windows: [20]
    range_windows: [20]
    outputs:
      - atr_like
      - range_mean

  price_action:
    enabled: true
    rolling_windows: [20]
    outputs:
      - close_position_in_range
      - body_pct
      - rolling_high
      - rolling_low

  volume:
    enabled: false

  regime:
    enabled: false
