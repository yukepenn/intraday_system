feature_set_id: opening_core_v2
version: feature_set_v2
description: Phase18B ORB/opening market facts for current-10 v2 refinements; generic/no-label
  features only.
engine:
  mode: reference
  session_reset: true
  dtype: float64
features:
  vwap:
    enabled: true
    price: hlc3
    outputs:
    - vwap
    - vwap_slope_5
    - vwap_side
    - vwap_dist
    - vwap_dist_pct
  orb:
    enabled: true
    open_minutes:
    - 5
    - 10
    - 15
    - 20
    outputs:
    - orb_high
    - orb_low
    - orb_mid
    - orb_range
    - orb_width_pct
  volatility:
    enabled: true
    atr_like_windows:
    - 20
    range_windows:
    - 20
    outputs:
    - atr_like
    - range_mean
  price_action:
    enabled: true
    rolling_windows:
    - 20
    outputs:
    - close_position_in_range
    - body_pct
    - rolling_high
    - rolling_low
  volume:
    enabled: true
    rolling_windows:
    - 20
    outputs:
    - volume_mean
    - rel_volume
  regime:
    enabled: false
