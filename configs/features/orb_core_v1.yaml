feature_set_id: orb_core_v1
version: feature_set_v1
description: Generic market-fact foundation for ORB continuation (Phase 12). Not strategy signals.

engine:
  mode: reference
  session_reset: true
  dtype: float64

features:
  vwap:
    enabled: true
    price: hlc3
    outputs:
      - vwap
      - vwap_slope_5

  orb:
    enabled: true
    open_minutes: [15]
    outputs:
      - orb_high
      - orb_low
      - orb_mid
      - orb_range
      - orb_width_pct

  volatility:
    enabled: true
    atr_like_windows: [20]
    range_windows: [20]
    outputs:
      - atr_like
      - range_mean

  price_action:
    enabled: false

  volume:
    enabled: false

  regime:
    enabled: false
