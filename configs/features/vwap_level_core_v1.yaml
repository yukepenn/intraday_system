feature_set_id: vwap_level_core_v1
version: feature_set_v1
description: VWAP pullback/reclaim market facts (Phase 13).

engine:
  mode: reference
  session_reset: true
  dtype: float64

features:
  vwap:
    enabled: true
    price: hlc3
    outputs:
      - vwap
      - vwap_slope_5
      - vwap_side
      - vwap_dist
      - vwap_dist_pct

  volatility:
    enabled: true
    atr_like_windows: [20]
    range_windows: [20]
    outputs:
      - atr_like
      - range_mean

  price_action:
    enabled: true
    rolling_windows: [20]
    outputs:
      - body_pct
      - lower_wick_pct
      - close_position_in_range
      - rolling_low
